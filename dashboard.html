<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - INFINITY</title>
    <link rel="stylesheet" href="mazen.css">
    <style>
        body { background: #f4f7fb; }
        .dashboard-wrap { max-width: 1280px; margin: 1.5rem auto; padding: 0 1rem; }
        .dash-topbar { display: flex; justify-content: space-between; align-items: center; gap: 1rem; background: #fff; border-radius: 14px; box-shadow: 0 6px 18px rgba(0,0,0,.08); padding: 1rem 1.2rem; margin-bottom: 1rem; }
        .dash-title { color: #0891b2; margin: 0; }
        .dash-user { margin: .3rem 0 0; color: #475569; font-size: .95rem; }
        .dash-actions { display: flex; gap: .6rem; }
        .dash-btn { border: none; border-radius: 10px; padding: .55rem .85rem; cursor: pointer; font-weight: 600; }
        .dash-btn.primary { background: #0891b2; color: #fff; }
        .dash-btn.ghost { background: #e2e8f0; color: #0f172a; }
        .dash-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        .dash-card { background: #fff; border-radius: 14px; box-shadow: 0 6px 18px rgba(0,0,0,.08); padding: 1rem; }
        .dash-card h3 { margin-top: 0; color: #0f172a; }
        .dash-table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
        .dash-table th, .dash-table td { border-bottom: 1px solid #e5e7eb; padding: 0.55rem; text-align: left; vertical-align: middle; }
        .status-chip { padding: .22rem .62rem; border-radius: 999px; font-size: .82rem; font-weight: 700; display: inline-block; }
        .status-completed { background: #dcfce7; color: #166534; }
        .status-processing { background: #dbeafe; color: #1d4ed8; }
        .status-pending { background: #fef9c3; color: #854d0e; }
        .status-cancelled { background: #fee2e2; color: #991b1b; }
        .status-failed { background: #e2e8f0; color: #334155; }
        .muted { color: #64748b; font-size: .85rem; }
        .user-create { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: .55rem; margin-bottom: .8rem; }
        .user-create input, .user-create select { padding: .5rem; border: 1px solid #cbd5e1; border-radius: 8px; }
        .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: .5rem; }
        .section-head select {
            padding: .45rem .65rem;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            background: #fff;
            min-width: 120px;
            font-weight: 600;
        }
        .section-tools {
            display: flex;
            align-items: center;
            gap: .55rem;
            flex-wrap: wrap;
        }
        .dash-search {
            min-width: 230px;
            padding: .45rem .65rem;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            background: #fff;
            font-size: .9rem;
        }
        .dash-tabs { display: flex; flex-wrap: wrap; gap: .6rem; margin-bottom: 1rem; }
        .dash-tab { border: none; border-radius: 10px; padding: .65rem .95rem; background: #e2e8f0; cursor: pointer; font-weight: 700; color: #0f172a; }
        .dash-tab.active { background: #0891b2; color: #fff; }
        .dash-section { display: none; }
        .dash-section.active { display: block; }
        .inventory-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        .inventory-thumb { width: 56px; height: 56px; object-fit: cover; border-radius: 10px; border: 1px solid #e2e8f0; background: #f8fafc; }
        .order-items-list { display: grid; gap: .45rem; }
        .order-item { display: flex; align-items: center; gap: .5rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: .35rem .45rem; }
        .order-item img { width: 36px; height: 36px; object-fit: cover; border-radius: 8px; border: 1px solid #dbe3ee; background: #fff; }
        .order-item .item-meta { font-size: .8rem; color: #334155; line-height: 1.25; }
        .order-summary-box { margin-top: .35rem; font-size: .8rem; color: #334155; display: grid; gap: .15rem; }
        .order-action {
            display: flex;
            align-items: center;
            gap: .4rem;
            min-width: 170px;
        }
        .order-action select { flex: 1; }
        .order-action button { white-space: nowrap; }
        .dash-table input[type="number"],
        .dash-table input[type="text"],
        .dash-table input[type="email"],
        .dash-table input[type="password"],
        .dash-table select,
        .user-create input,
        .user-create select {
            width: 100%;
            min-width: 90px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: .42rem .5rem;
            background: #fff;
            color: #0f172a;
            font-size: .88rem;
            transition: border-color .2s ease, box-shadow .2s ease;
            box-sizing: border-box;
        }
        /* Inventory numeric inputs: compact but readable (fits ~5 digits on phones) */
        #products-table input[type="number"] {
            width: 82px;
            min-width: 74px;
            max-width: 92px;
            padding: .42rem .3rem;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }
        #products-table input[type="number"]::-webkit-outer-spin-button,
        #products-table input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        #products-table input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }
        .dash-table input:focus,
        .dash-table select:focus,
        .user-create input:focus,
        .user-create select:focus {
            outline: none;
            border-color: #0891b2;
            box-shadow: 0 0 0 3px rgba(8,145,178,.15);
        }
        .dash-table button {
            border: none;
            border-radius: 8px;
            background: #0891b2;
            color: #fff;
            font-weight: 700;
            font-size: .82rem;
            padding: .42rem .65rem;
            cursor: pointer;
            transition: background .2s ease, transform .15s ease, opacity .2s ease;
        }
        .dash-table button:hover { background: #0e7490; transform: translateY(-1px); }
        .dash-table button:disabled {
            background: #cbd5e1;
            color: #64748b;
            cursor: not-allowed;
            transform: none;
        }
        #users-table button {
            background: #dc2626;
        }
        #users-table button:hover { background: #b91c1c; }
        #users-table button:disabled {
            background: #e5e7eb;
            color: #94a3b8;
        }
        .pdf-btn {
            background: #0f766e !important;
            margin-left: .3rem;
        }
        .pdf-btn:hover { background: #115e59 !important; }
        .save-status {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 88px;
            padding: .28rem .55rem;
            border-radius: 999px;
            font-size: .78rem;
            font-weight: 700;
            border: 1px solid transparent;
            text-transform: capitalize;
        }
        .save-status.idle {
            background: #f1f5f9;
            border-color: #cbd5e1;
            color: #475569;
        }
        .save-status.saving {
            background: #e0f2fe;
            border-color: #7dd3fc;
            color: #075985;
        }
        .save-status.saved {
            background: #dcfce7;
            border-color: #86efac;
            color: #166534;
        }
        .save-status.failed {
            background: #fee2e2;
            border-color: #fca5a5;
            color: #991b1b;
        }
        .dash-toast {
            position: fixed;
            right: 1rem;
            bottom: 1rem;
            z-index: 2000;
            min-width: 220px;
            max-width: 360px;
            padding: .75rem .9rem;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(2, 6, 23, .25);
            transform: translateY(12px);
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s ease, transform .2s ease;
        }
        .dash-toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .dash-toast.success { background: linear-gradient(135deg, #0f766e, #0891b2); }
        .dash-toast.error { background: linear-gradient(135deg, #b91c1c, #ef4444); }
        @media (max-width: 1050px) { .user-create { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 680px) {
            .dashboard-wrap { padding: 0 .55rem; margin: 1rem auto; }
            .dash-card {
                padding: .75rem;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            .dash-table { min-width: 920px; }
            .dash-table th, .dash-table td { padding: .5rem .45rem; }
            .user-create { grid-template-columns: 1fr; }
            .dash-topbar { flex-direction: column; align-items: flex-start; }
            .dash-actions { width: 100%; }
            .dash-actions .dash-btn { flex: 1; text-align: center; justify-content: center; }
            .order-action { flex-direction: column; align-items: stretch; min-width: 130px; }
            .dash-search { min-width: 100%; width: 100%; }
            #products-table input[type="number"] {
                width: 76px;
                min-width: 70px;
                max-width: 86px;
                padding-left: .28rem;
                padding-right: .28rem;
            }
            .dash-toast {
                right: max(0.55rem, env(safe-area-inset-right));
                left: max(0.55rem, env(safe-area-inset-left));
                bottom: max(0.75rem, env(safe-area-inset-bottom));
                max-width: none;
                min-width: 0;
                font-size: .9rem;
            }
        }
        @media (min-width: 681px) and (max-width: 1024px) {
            .dash-card { overflow-x: auto; }
            .dash-table { min-width: 980px; }
        }
        /* Inventory, User Management, Customers, Orders: card rows on phones & tablets */
        @media (max-width: 1024px) {
            #inventory-section .dash-card,
            #users-section .dash-card,
            #customers-section .dash-card,
            #orders-section .dash-card {
                overflow-x: visible;
            }
            #products-table.dash-table,
            #users-table.dash-table,
            #customers-table.dash-table,
            #orders-table.dash-table {
                min-width: 0 !important;
                width: 100%;
                border-collapse: separate;
                border-spacing: 0;
            }
            #products-table thead,
            #users-table thead,
            #customers-table thead,
            #orders-table thead {
                display: none;
            }
            #users-table tbody,
            #users-table tr,
            #users-table td,
            #customers-table tbody,
            #customers-table tr,
            #customers-table td,
            #orders-table tbody,
            #orders-table tr,
            #orders-table td {
                display: block;
                width: 100%;
                box-sizing: border-box;
            }
            /* Inventory cards: use horizontal space (product + image row, 3-col numbers) */
            #products-table tbody {
                display: block;
                width: 100%;
                box-sizing: border-box;
            }
            #products-table tr {
                display: grid;
                grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr);
                gap: 0.45rem 0.5rem;
                align-items: start;
                box-sizing: border-box;
            }
            #products-table td {
                display: block;
                width: auto;
                min-width: 0;
                max-width: 100%;
                box-sizing: border-box;
            }
            #products-table td[data-label="Product"] {
                grid-column: 1 / 3;
            }
            #products-table td[data-label="Image"] {
                grid-column: 3;
                grid-row: 1;
                justify-self: end;
                align-self: start;
            }
            #products-table td[data-label="Image"] .inventory-thumb {
                width: 52px;
                height: 52px;
            }
            #products-table td[data-label="Price"] {
                grid-column: 1;
            }
            #products-table td[data-label="Install"] {
                grid-column: 2;
            }
            #products-table td[data-label="Stock"] {
                grid-column: 3;
            }
            #products-table td[data-label="Active"] {
                grid-column: 1 / -1;
            }
            #products-table td[data-label="Update"] {
                grid-column: 1 / -1;
            }
            #products-table td[data-label="Price"] input[type="number"],
            #products-table td[data-label="Install"] input[type="number"],
            #products-table td[data-label="Stock"] input[type="number"] {
                width: 100%;
                min-width: 0;
                max-width: none;
            }
            #products-table tr,
            #users-table tr,
            #customers-table tr,
            #orders-table tr {
                border: 1px solid #e2e8f0;
                border-radius: 12px;
                margin-bottom: 0.75rem;
                padding: 0.65rem 0.75rem;
                background: #f8fafc;
            }
            #products-table td,
            #users-table td,
            #customers-table td,
            #orders-table td {
                border: none;
                padding: 0.45rem 0;
                text-align: left;
            }
            #products-table td::before,
            #users-table td::before,
            #customers-table td::before,
            #orders-table td::before {
                content: attr(data-label);
                display: block;
                font-size: 0.72rem;
                font-weight: 700;
                letter-spacing: 0.02em;
                text-transform: uppercase;
                color: #64748b;
                margin-bottom: 0.2rem;
            }
            #users-table td[data-label="Action"] {
                padding-top: 0.65rem;
                margin-top: 0.35rem;
                border-top: 1px solid #e2e8f0;
            }
            #users-table td[data-label="Action"]::before {
                margin-bottom: 0.45rem;
            }
            #users-table td[data-label="Action"] button {
                width: 100%;
            }
            #orders-table td[data-label="Actions"] {
                padding-top: 0.65rem;
                margin-top: 0.35rem;
                border-top: 1px solid #e2e8f0;
            }
            #orders-table td[data-label="Actions"] .order-action {
                display: grid;
                grid-template-columns: 1fr;
                gap: 0.45rem;
                min-width: 0;
            }
            #orders-table td[data-label="Actions"] .order-action button,
            #orders-table td[data-label="Actions"] .order-action select {
                width: 100%;
            }
            #products-table td[data-label="Update"] {
                padding-top: 0.65rem;
                margin-top: 0.35rem;
                border-top: 1px solid #e2e8f0;
            }
            #products-table td[data-label="Update"] .save-status {
                width: 100%;
                max-width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-wrap">
        <div class="dash-topbar">
            <div>
                <h2 class="dash-title">Staff Dashboard</h2>
                <p id="dash-user" class="dash-user"></p>
            </div>
            <div class="dash-actions">
                <a href="/index.html" class="dash-btn ghost" style="text-decoration:none;display:inline-flex;align-items:center;">Website</a>
                <button class="dash-btn primary" id="dash-logout-btn">Sign Out</button>
            </div>
        </div>

        <div class="dash-tabs">
            <button class="dash-tab active" data-section="inventory-section">Inventory</button>
            <button class="dash-tab" data-section="orders-section">Orders</button>
            <button class="dash-tab" data-section="customers-section">Customers</button>
            <button class="dash-tab" data-section="users-section">User Management</button>
        </div>

        <div id="inventory-section" class="dash-section active">
            <div class="dash-card">
                <div class="section-head">
                    <h3>Inventory</h3>
                    <div class="section-tools">
                        <input id="inventory-search" class="dash-search" placeholder="Search product name or ID...">
                        <button class="dash-btn primary" id="save-all-inventory-btn">Save All</button>
                    </div>
                </div>
                <table class="dash-table" id="products-table">
                    <thead><tr><th>Product</th><th>Image</th><th>Price</th><th>Install</th><th>Stock</th><th>Active</th><th>Update</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="orders-section" class="dash-section">
            <div class="dash-card">
                <div class="section-head">
                    <h3>Orders</h3>
                    <div class="section-tools">
                        <input id="orders-search" class="dash-search" placeholder="Search order by ID, customer, email, phone, method...">
                        <label>Filter:
                            <select id="status-filter">
                                <option value="">All</option>
                                <option value="pending">pending</option>
                                <option value="processing">processing</option>
                                <option value="completed">completed</option>
                                <option value="cancelled">cancelled</option>
                                <option value="failed">failed</option>
                            </select>
                        </label>
                    </div>
                </div>
                <table class="dash-table" id="orders-table">
                    <thead><tr><th>Order</th><th>Customer</th><th>Contact</th><th>Location</th><th>Items / Amount</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="customers-section" class="dash-section">
            <div class="dash-card">
                <div class="section-head">
                    <h3>Customers</h3>
                    <div class="section-tools">
                        <input id="customers-search" class="dash-search" placeholder="Search by name, email, phone, gender, age, address...">
                    </div>
                </div>
                <table class="dash-table" id="customers-table">
                    <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Profile</th><th>Location / Company</th><th>Created</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="users-section" class="dash-section">
        <div class="dash-card" style="margin-top:1rem;">
            <h3>User Management</h3>
            <p class="muted" id="user-mgmt-note">Create/delete staff users by role permissions.</p>
            <input id="users-search" class="dash-search" placeholder="Search user by name, email, or role..." style="margin-bottom:.75rem; max-width: 420px;">
            <div class="user-create" id="user-create-form">
                <input id="new-user-name" placeholder="Name">
                <input id="new-user-email" placeholder="Email">
                <input id="new-user-password" placeholder="Password" type="password">
                <select id="new-user-role">
                    <option value="technical">technical</option>
                    <option value="employee">employee</option>
                    <option value="manager">manager</option>
                </select>
                <button class="dash-btn primary" id="create-user-btn">Create</button>
            </div>
            <table class="dash-table" id="users-table">
                <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Action</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        </div>
    </div>
    <div id="dash-toast" class="dash-toast" role="status" aria-live="polite"></div>

    <script>
        let currentRole = "customer";
        let currentUserId = "";
        let allProducts = [];
        let allOrders = [];
        let allCustomers = [];
        let allUsers = [];
        let toastTimer;

        function canEditInventory() { return ['employee','manager','primary'].includes(currentRole); }
        function canEditOrders() { return ['employee','manager','primary'].includes(currentRole); }
        function canManageUsers() { return ['employee','manager','primary'].includes(currentRole); }
        function canDeleteUserRole(targetRole) {
            if (targetRole === 'primary') return false;
            if (currentRole === 'primary') return true;
            if (currentRole === 'manager') return targetRole !== 'primary';
            if (currentRole === 'employee') return !['primary','manager'].includes(targetRole);
            return false;
        }

        async function ensureStaff() {
            const res = await fetch('/api/user', { credentials: 'include' });
            if (!res.ok) { window.location.href = '/auth.html'; return false; }
            const data = await res.json();
            currentRole = data?.user?.role || 'customer';
            currentUserId = data?.user?.id || '';
            document.getElementById('dash-user').textContent = `Logged in as ${data?.user?.name || ''} (${currentRole})`;
            if (!['technical','employee','manager','primary'].includes(currentRole)) {
                alert('You are not allowed to access dashboard');
                window.location.href = '/index.html';
                return false;
            }
            return true;
        }

        async function loadProducts() {
            const res = await fetch('/api/dashboard/products', { credentials: 'include' });
            const data = await res.json();
            allProducts = Array.isArray(data.products) ? data.products : [];
            renderProducts();
        }

        function renderProducts() {
            const keyword = (document.getElementById('inventory-search')?.value || '').trim().toLowerCase();
            const tbody = document.querySelector('#products-table tbody');
            tbody.innerHTML = '';
            const visible = allProducts.filter((p) => {
                if (!keyword) return true;
                const hay = `${p.name || ''} ${p.productId || ''}`.toLowerCase();
                return hay.includes(keyword);
            });

            visible.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td data-label="Product">${p.name}<br><small class="muted">${p.productId}</small></td>
                    <td data-label="Image"><img class="inventory-thumb" src="${p.image || 'assets/images/infinity-logo.png'}" alt="${p.name}"></td>
                    <td data-label="Price"><input type="number" min="0" value="${p.price || 0}" id="price-${p.productId}" ${!canEditInventory() ? 'disabled' : ''}></td>
                    <td data-label="Install"><input type="number" min="0" value="${p.installation || 0}" id="installation-${p.productId}" ${!canEditInventory() ? 'disabled' : ''}></td>
                    <td data-label="Stock"><input type="number" min="0" value="${p.stock}" id="stock-${p.productId}" ${!canEditInventory() ? 'disabled' : ''}></td>
                    <td data-label="Active">${p.active ? 'Yes' : 'No'}</td>
                    <td data-label="Update"><span class="save-status idle" id="save-status-${p.productId}">idle</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function setProductSaveStatus(productId, state) {
            const el = document.getElementById(`save-status-${productId}`);
            if (!el) return;
            el.className = `save-status ${state}`;
            el.textContent = state;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('dash-toast');
            if (!toast) return;
            clearTimeout(toastTimer);
            toast.textContent = message;
            toast.className = `dash-toast ${type} show`;
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2600);
        }

        async function updateStock(productId) {
            if (!canEditInventory()) return;
            const stock = Number(document.getElementById(`stock-${productId}`).value);
            const price = Number(document.getElementById(`price-${productId}`).value);
            const installation = Number(document.getElementById(`installation-${productId}`).value);
            const res = await fetch(`/api/dashboard/products/${productId}/stock`, {
                method: 'PATCH',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stock, price, installation })
            });
            if (!res.ok) { alert('Failed to update stock'); return; }
            await loadProducts();
        }

        async function saveAllInventory() {
            if (!canEditInventory()) return;
            const btn = document.getElementById('save-all-inventory-btn');
            btn.disabled = true;
            const previousText = btn.textContent;
            btn.textContent = 'Saving...';

            try {
                const updates = allProducts.map((p) => {
                    const stockEl = document.getElementById(`stock-${p.productId}`);
                    const priceEl = document.getElementById(`price-${p.productId}`);
                    const installationEl = document.getElementById(`installation-${p.productId}`);
                    if (!stockEl || !priceEl || !installationEl) return null;
                    return {
                        productId: p.productId,
                        stock: Number(stockEl.value),
                        price: Number(priceEl.value),
                        installation: Number(installationEl.value)
                    };
                }).filter(Boolean);

                updates.forEach((u) => setProductSaveStatus(u.productId, 'saving'));
                const results = await Promise.all(updates.map(async (u) => {
                    try {
                        const res = await fetch(`/api/dashboard/products/${u.productId}/stock`, {
                            method: 'PATCH',
                            credentials: 'include',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                stock: u.stock,
                                price: u.price,
                                installation: u.installation
                            })
                        });
                        setProductSaveStatus(u.productId, res.ok ? 'saved' : 'failed');
                        return res.ok;
                    } catch (_error) {
                        setProductSaveStatus(u.productId, 'failed');
                        return false;
                    }
                }));

                const successCount = results.filter(Boolean).length;
                const failedCount = results.length - successCount;
                if (failedCount === 0) {
                    showToast(`Saved ${successCount} products successfully.`, 'success');
                } else {
                    showToast(`Saved ${successCount}, failed ${failedCount}.`, 'error');
                }

                setTimeout(() => {
                    updates.forEach((u) => setProductSaveStatus(u.productId, 'idle'));
                }, 2600);
            } catch (error) {
                showToast('Failed to save inventory changes.', 'error');
            } finally {
                btn.disabled = !canEditInventory();
                btn.textContent = previousText;
            }
        }

        async function loadOrders() {
            const status = document.getElementById('status-filter').value;
            const res = await fetch(`/api/dashboard/orders${status ? `?status=${encodeURIComponent(status)}` : ''}`, { credentials: 'include' });
            const data = await res.json();
            allOrders = Array.isArray(data.orders) ? data.orders : [];
            renderOrders();
        }

        function renderOrders() {
            const keyword = (document.getElementById('orders-search')?.value || '').trim().toLowerCase();
            const tbody = document.querySelector('#orders-table tbody');
            tbody.innerHTML = '';
            const visible = allOrders.filter((o) => {
                if (!keyword) return true;
                const hay = [
                    o._id,
                    o.transactionId,
                    o.customerName,
                    o.customerEmail,
                    o.customerPhone,
                    o.customerState,
                    o.customerCompanyName,
                    o.customerCompanyLocation,
                    o.paymentMethod,
                    o.status,
                    o.currency,
                    o.amount
                ].filter(Boolean).join(' ').toLowerCase();
                return hay.includes(keyword);
            });

            visible.forEach(o => {
                const disabled = canEditOrders() ? '' : 'disabled';
                const items = Array.isArray(o.orderItems) ? o.orderItems : [];
                const statusClass = `status-${String(o.status || '').toLowerCase()}`;
                const itemsHtml = items.length
                    ? items.map((item) => `
                        <div class="order-item">
                            <img src="${item.image || 'assets/images/infinity-logo.png'}" alt="${item.name || 'item'}">
                            <div class="item-meta">
                                <div><strong>${item.name || '-'}</strong> x ${item.quantity || 1}</div>
                                <div>Price: EGP ${Number(item.price || 0).toFixed(2)} | Install: EGP ${Number(item.installation || 0).toFixed(2)}</div>
                            </div>
                        </div>
                    `).join('')
                    : '<span class="muted">No items</span>';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td data-label="Order">${o.transactionId}<br><small class="muted">${new Date(o.createdAt).toLocaleString()}</small></td>
                    <td data-label="Customer">${o.customerName || '-'}<br><small class="muted">${o.customerEmail || '-'}</small></td>
                    <td data-label="Contact">${o.customerPhone || '-'}<br><small class="muted">${o.customerGender || '-'} | Age: ${o.customerAge || '-'}</small></td>
                    <td data-label="Location">${o.customerState || '-'}<br><small class="muted">${o.customerCompanyName || '-'} / ${o.customerCompanyLocation || '-'}</small></td>
                    <td data-label="Items / Amount">
                        <div class="order-items-list">${itemsHtml}</div>
                        <div class="order-summary-box">
                            <div><strong>Amount:</strong> EGP ${Number(o.amount || 0).toFixed(2)} ${o.currency || ''}</div>
                            <div><strong>Payment:</strong> ${o.paymentMethod || '-'}</div>
                            <div><strong>VAT:</strong> ${o.vatApplied ? 'Applied' : 'No'}</div>
                            <div><strong>Billing Address:</strong> ${o.billingAddress || '-'}</div>
                        </div>
                    </td>
                    <td data-label="Status"><span class="status-chip ${statusClass}">${o.status}</span></td>
                    <td data-label="Actions">
                        <div class="order-action">
                            <select id="order-status-${o._id}" ${disabled}>
                                <option ${o.status === 'pending' ? 'selected' : ''}>pending</option>
                                <option ${o.status === 'processing' ? 'selected' : ''}>processing</option>
                                <option ${o.status === 'completed' ? 'selected' : ''}>completed</option>
                                <option ${o.status === 'cancelled' ? 'selected' : ''}>cancelled</option>
                                <option ${o.status === 'failed' ? 'selected' : ''}>failed</option>
                            </select>
                            <button ${disabled} onclick="updateOrderStatus('${o._id}')">Update</button>
                            <button class="pdf-btn" onclick="downloadOrderPdf('${o._id}')">PDF</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function downloadOrderPdf(orderId) {
            window.open(`/api/dashboard/orders/${orderId}/pdf`, '_blank');
        }

        async function updateOrderStatus(orderId) {
            if (!canEditOrders()) return;
            const status = document.getElementById(`order-status-${orderId}`).value;
            const res = await fetch(`/api/dashboard/orders/${orderId}/status`, {
                method: 'PATCH',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            if (!res.ok) { alert('Failed to update order status'); return; }
            await loadOrders();
        }

        async function loadUsers() {
            const res = await fetch('/api/dashboard/users', { credentials: 'include' });
            const data = await res.json();
            allUsers = Array.isArray(data.users) ? data.users : [];
            renderUsers();
        }

        async function loadCustomers() {
            const res = await fetch('/api/dashboard/customers', { credentials: 'include' });
            const data = await res.json();
            allCustomers = Array.isArray(data.customers) ? data.customers : [];
            renderCustomers();
        }

        function renderCustomers() {
            const keyword = (document.getElementById('customers-search')?.value || '').trim().toLowerCase();
            const tbody = document.querySelector('#customers-table tbody');
            tbody.innerHTML = '';
            const visible = allCustomers.filter((c) => {
                if (!keyword) return true;
                const hay = [
                    c.name, c.email, c.phone, c.gender, c.age, c.state,
                    c.companyName, c.companyLocation
                ].filter(Boolean).join(' ').toLowerCase();
                return hay.includes(keyword);
            });

            visible.forEach((c) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td data-label="Name">${c.name || '-'}</td>
                    <td data-label="Email">${c.email || '-'}</td>
                    <td data-label="Phone">${c.phone || '-'}</td>
                    <td data-label="Profile">${c.gender || '-'} | Age: ${c.age ?? '-'}</td>
                    <td data-label="Location / Company">${c.state || '-'}<br><small class="muted">${c.companyName || '-'} / ${c.companyLocation || '-'}</small></td>
                    <td data-label="Created"><small class="muted">${c.createdAt ? new Date(c.createdAt).toLocaleString() : '-'}</small></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderUsers() {
            const keyword = (document.getElementById('users-search')?.value || '').trim().toLowerCase();
            const tbody = document.querySelector('#users-table tbody');
            tbody.innerHTML = '';
            const visible = allUsers.filter((u) => {
                if (!keyword) return true;
                const hay = `${u.name || ''} ${u.email || ''} ${u.role || ''}`.toLowerCase();
                return hay.includes(keyword);
            });

            visible.forEach(u => {
                const canDelete = canDeleteUserRole(u.role) && String(u._id) !== String(currentUserId);
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td data-label="Name">${u.name || '-'}</td>
                    <td data-label="Email">${u.email}</td>
                    <td data-label="Role">${u.role}</td>
                    <td data-label="Action">
                        <button ${canDelete ? '' : 'disabled'} onclick="deleteUser('${u._id}')">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function createUser() {
            if (!canManageUsers()) return;
            const name = document.getElementById('new-user-name').value.trim();
            const email = document.getElementById('new-user-email').value.trim();
            const password = document.getElementById('new-user-password').value;
            const role = document.getElementById('new-user-role').value;
            const res = await fetch('/api/dashboard/users', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, role })
            });
            const data = await res.json();
            if (!res.ok) { alert(data.error || 'Create user failed'); return; }
            document.getElementById('new-user-name').value = '';
            document.getElementById('new-user-email').value = '';
            document.getElementById('new-user-password').value = '';
            await loadUsers();
        }

        async function deleteUser(userId) {
            const res = await fetch(`/api/dashboard/users/${userId}`, {
                method: 'DELETE',
                credentials: 'include'
            });
            const data = await res.json();
            if (!res.ok) { alert(data.error || 'Delete user failed'); return; }
            await loadUsers();
        }

        document.getElementById('status-filter').addEventListener('change', loadOrders);
        document.getElementById('inventory-search').addEventListener('input', renderProducts);
        document.getElementById('orders-search').addEventListener('input', renderOrders);
        document.getElementById('customers-search').addEventListener('input', renderCustomers);
        document.getElementById('users-search').addEventListener('input', renderUsers);
        document.getElementById('save-all-inventory-btn').addEventListener('click', saveAllInventory);
        document.getElementById('create-user-btn').addEventListener('click', createUser);
        document.getElementById('dash-logout-btn').addEventListener('click', async () => {
            await fetch('/api/logout', { method: 'POST', credentials: 'include' });
            window.location.href = '/auth.html';
        });
        document.querySelectorAll('.dash-tab').forEach((btn) => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.dash-tab').forEach((b) => b.classList.remove('active'));
                document.querySelectorAll('.dash-section').forEach((s) => s.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.section).classList.add('active');
            });
        });

        (async () => {
            const ok = await ensureStaff();
            if (!ok) return;

            if (!['manager', 'primary'].includes(currentRole)) {
                document.getElementById('user-create-form').style.display = 'none';
                document.getElementById('user-mgmt-note').textContent = currentRole === 'employee'
                    ? 'Employee cannot create accounts.'
                    : 'Read-only role for user management.';
            }
            document.getElementById('save-all-inventory-btn').disabled = !canEditInventory();
            if (currentRole === 'technical') {
                document.getElementById('user-mgmt-note').textContent = 'Technical role: view-only access.';
            }

            await Promise.all([loadProducts(), loadOrders(), loadCustomers(), loadUsers()]);
        })();
    </script>
</body>
</html>
