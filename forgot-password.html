<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - INFINITY</title>
    <link rel="icon" href="assets/images/infinity-logo1.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/images/infinity-logo1.png">
    <link rel="stylesheet" href="mazen.css?v=20260506-1">
    <link rel="stylesheet" href="infinity-loader.css?v=20260607">
    <link rel="stylesheet" href="form-validation.css?v=20260619">
    <link rel="stylesheet" href="password-reset.css?v=20260620">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="pr-page">
    <div class="pr-wrap">
        <div class="pr-card">
            <a href="auth.html" class="pr-back" aria-label="Back to sign in"><i class="fas fa-arrow-left" aria-hidden="true"></i> Back to sign in</a>
            <div class="pr-steps" aria-hidden="true">
                <span class="pr-step active"></span>
                <span class="pr-step"></span>
                <span class="pr-step"></span>
            </div>
            <img src="assets/images/infinity-logo1.png" alt="" class="pr-logo" width="56" height="56">
            <h1 class="pr-title">Forgot Password</h1>
            <p class="pr-sub">Enter the email address linked to your account. If it is registered, we will send a 6-digit verification code valid for 10 minutes.</p>

            <form id="forgot-form" novalidate>
                <div class="pr-group">
                    <label for="forgot-email">Email address</label>
                    <input type="email" id="forgot-email" name="email" autocomplete="email" required aria-required="true" placeholder="you@example.com">
                </div>
                <button type="submit" class="pr-btn" id="forgot-submit">Send verification code</button>
                <div id="forgot-msg" class="pr-msg" aria-live="polite"></div>
            </form>
        </div>
    </div>

    <script src="infinity-loader.js?v=20260607"></script>
    <script src="connectivity.js?v=20260607"></script>
    <script src="form-validation.js?v=20260619"></script>
    <script src="password-reset.js?v=20260620"></script>
    <script>
        (function () {
            const form = document.getElementById('forgot-form');
            const emailInput = document.getElementById('forgot-email');
            const msg = document.getElementById('forgot-msg');
            const submitBtn = document.getElementById('forgot-submit');
            const {
                showMessage, hideMessage, apiPost, setRecoveryEmail,
                setExpiresAt, clearRecoverySession, GENERIC_REQUEST_MESSAGE
            } = PasswordResetUI;

            if (window.FormValidation) {
                FormValidation.attachForgotEmailValidation(form);
            }

            if (window.InfinityLoader) InfinityLoader.startPageEnter();

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                hideMessage(msg);

                const email = emailInput.value.trim();
                const emailCheck = FormValidation ? FormValidation.validateEmail(email) : { valid: !!email };
                if (!emailCheck.valid) {
                    if (FormValidation) FormValidation.setFieldError(emailInput, emailCheck.message);
                    return;
                }

                if (window.InfinityLoader) InfinityLoader.setButtonLoading(submitBtn, true);
                try {
                    const data = await apiPost('/api/password-reset/request', { email });
                    clearRecoverySession();
                    setRecoveryEmail(email);
                    setExpiresAt(data.expiresAt);
                    showMessage(msg, data.message || GENERIC_REQUEST_MESSAGE, 'success');
                    setTimeout(() => {
                        window.location.href = 'verify-otp.html';
                    }, 600);
                } catch (err) {
                    showMessage(msg, err.message || 'Something went wrong. Please try again.', 'error');
                } finally {
                    if (window.InfinityLoader) InfinityLoader.setButtonLoading(submitBtn, false);
                }
            });
        })();
    </script>
</body>
</html>
