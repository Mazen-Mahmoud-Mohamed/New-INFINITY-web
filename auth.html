<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In / Sign Up - Infinity</title>
    <link rel="icon" href="assets/images/infinity-logo1.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/images/infinity-logo1.png">
    <link rel="stylesheet" href="mazen.css?v=20260506-1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: var(--light-gray);
        }

        .auth-card {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            transition: var(--transition);
        }

        .auth-card:hover {
            box-shadow: var(--hover-shadow);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            color: var(--primary-color);
            font-size: clamp(1.5rem, 4vw, 2rem);
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-light);
            font-size: clamp(0.9rem, 2vw, 1rem);
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border-color);
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: clamp(0.8rem, 2vw, 1rem);
            cursor: pointer;
            color: var(--text-light);
            transition: var(--transition);
            font-weight: 500;
            font-size: clamp(0.9rem, 2vw, 1rem);
        }

        .auth-tab.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            margin-bottom: -2px;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .signup-grid {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 0 1rem;
        }

        .signup-grid.active {
            display: grid;
        }

        .signup-grid .form-group {
            margin-bottom: 1rem;
        }

        .signup-grid .full-width {
            grid-column: 1 / -1;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            font-weight: 500;
            font-size: clamp(0.9rem, 2vw, 1rem);
        }

        .form-group input {
            width: 100%;
            padding: clamp(0.7rem, 2vw, 0.8rem);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            transition: var(--transition);
            font-size: clamp(0.9rem, 2vw, 1rem);
        }

        .password-field {
            position: relative;
        }

        .password-field input {
            padding-right: 2.6rem;
        }

        .toggle-password {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: var(--text-light);
            cursor: pointer;
            padding: 0.2rem;
            font-size: 1rem;
        }

        .toggle-password:hover {
            color: var(--primary-color);
        }

        .form-group select {
            width: 100%;
            padding: clamp(0.7rem, 2vw, 0.8rem);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            transition: var(--transition);
            font-size: clamp(0.9rem, 2vw, 1rem);
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(0, 153, 204, 0.1);
        }

        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(0, 153, 204, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: clamp(0.8rem, 2vw, 1rem);
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-size: clamp(0.9rem, 2vw, 1rem);
        }

        .auth-btn:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        .social-auth {
            margin-top: 2rem;
            text-align: center;
        }

        .social-auth p {
            color: var(--text-light);
            margin-bottom: 1rem;
            font-size: clamp(0.9rem, 2vw, 1rem);
        }

        .social-buttons {
            display: flex;
            gap: clamp(0.5rem, 2vw, 1rem);
            justify-content: center;
            flex-wrap: wrap;
        }

        .social-btn {
            padding: clamp(0.7rem, 2vw, 0.8rem);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            background: white;
            color: var(--text-color);
            cursor: pointer;
            transition: var(--transition);
            min-width: clamp(2.5rem, 8vw, 3rem);
            height: clamp(2.5rem, 8vw, 3rem);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-btn:hover {
            background: var(--light-gray);
            color: var(--primary-color);
            transform: translateY(-2px);
        }

        .social-btn i {
            font-size: clamp(1rem, 3vw, 1.2rem);
        }

        .forgot-password {
            text-align: right;
            margin-top: -1rem;
            margin-bottom: 1.5rem;
        }

        .forgot-password a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .form-message {
            margin-top: 0.5rem;
            margin-bottom: 0.75rem;
            padding: 0.65rem 0.8rem;
            border-radius: 10px;
            font-size: 0.9rem;
            border: 1px solid transparent;
        }

        .form-message.error {
            color: #991b1b;
            background: #fee2e2;
            border-color: #fecaca;
        }

        .form-message.success {
            color: #166534;
            background: #dcfce7;
            border-color: #86efac;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .auth-container {
                padding: 1rem;
            }

            .auth-card {
                padding: 1.5rem;
            }

            .social-buttons {
                gap: 0.5rem;
            }

            .signup-grid.active {
                grid-template-columns: 1fr;
            }
        }

        @media (min-width: 900px) {
            .auth-card {
                max-width: 920px;
            }
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 0.5rem;
            }

            .auth-card {
                padding: 1rem;
            }

            .auth-tabs {
                margin-bottom: 1.5rem;
            }

            .form-group {
                margin-bottom: 1rem;
            }
        }

        /* Tablet Optimization */
        @media (min-width: 769px) and (max-width: 1024px) {
            .auth-card {
                max-width: 450px;
            }
        }

        /* Landscape Mode */
        @media (max-height: 600px) and (orientation: landscape) {
            .auth-container {
                padding: 1rem;
            }

            .auth-card {
                padding: 1.5rem;
            }

            .form-group {
                margin-bottom: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your account or create a new one</p>
            </div>
            
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('signin')">Sign In</div>
                <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
            </div>

            <form class="auth-form active" id="signin-form">
                <div class="form-group">
                    <label for="signin-email">Email</label>
                    <input type="email" id="signin-email" required>
                </div>
                <div class="form-group">
                    <label for="signin-password">Password</label>
                    <div class="password-field">
                        <input type="password" id="signin-password" required>
                        <button type="button" class="toggle-password" data-target="signin-password" aria-label="Show password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="forgot-password">
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="auth-btn">Sign In</button>
            </form>

            <form class="auth-form signup-grid" id="signup-form">
                <div class="form-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" required>
                </div>
                <div class="form-group">
                    <label for="signup-phone">Phone Number (Egypt)</label>
                    <input type="tel" id="signup-phone" placeholder="01XXXXXXXXX" required>
                </div>
                <div class="form-group">
                    <label for="signup-age">Age</label>
                    <input type="number" id="signup-age" min="16" max="100" required>
                </div>
                <div class="form-group">
                    <label for="signup-gender">Gender</label>
                    <select id="signup-gender" required>
                        <option value="">Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="prefer_not_to_say">Prefer not to say</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="signup-state">State in Egypt</label>
                    <select id="signup-state" required>
                        <option value="">Select State</option>
                        <option value="Cairo">Cairo</option>
                        <option value="Giza">Giza</option>
                        <option value="Alexandria">Alexandria</option>
                        <option value="Qalyubia">Qalyubia</option>
                        <option value="Dakahlia">Dakahlia</option>
                        <option value="Red Sea">Red Sea</option>
                        <option value="Beheira">Beheira</option>
                        <option value="Fayoum">Fayoum</option>
                        <option value="Gharbia">Gharbia</option>
                        <option value="Ismailia">Ismailia</option>
                        <option value="Menofia">Menofia</option>
                        <option value="Minya">Minya</option>
                        <option value="Qena">Qena</option>
                        <option value="Aswan">Aswan</option>
                        <option value="Sohag">Sohag</option>
                        <option value="Suez">Suez</option>
                        <option value="Sharqia">Sharqia</option>
                        <option value="Assiut">Assiut</option>
                        <option value="Beni Suef">Beni Suef</option>
                        <option value="Port Said">Port Said</option>
                        <option value="Damietta">Damietta</option>
                        <option value="Luxor">Luxor</option>
                        <option value="Matrouh">Matrouh</option>
                        <option value="North Sinai">North Sinai</option>
                        <option value="South Sinai">South Sinai</option>
                        <option value="Kafr El Sheikh">Kafr El Sheikh</option>
                        <option value="Monufia">Monufia</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="signup-company-name">Company Name (optional)</label>
                    <input type="text" id="signup-company-name" placeholder="Your company name">
                </div>
                <div class="form-group full-width">
                    <label for="signup-company-location">Company Location (optional)</label>
                    <input type="text" id="signup-company-location" placeholder="City / Address">
                </div>
                <div class="form-group full-width">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <div class="password-field">
                        <input type="password" id="signup-password" required>
                        <button type="button" class="toggle-password" data-target="signup-password" aria-label="Show password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="signup-confirm-password">Confirm Password</label>
                    <div class="password-field">
                        <input type="password" id="signup-confirm-password" required>
                        <button type="button" class="toggle-password" data-target="signup-confirm-password" aria-label="Show password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="auth-btn full-width">Create Account</button>
            </form>

            <div class="social-auth">
                <p>Or continue with</p>
                <div class="social-buttons">
                    <button class="social-btn" id="google-auth-btn" aria-label="Sign in with Google">
                        <i class="fab fa-google"></i>
                    </button>
                    <button class="social-btn" id="facebook-auth-btn" aria-label="Sign in with Facebook">
                        <i class="fab fa-facebook-f"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="connectivity.js?v=20260607"></script>
    <script>
        // Check if user is already logged in
        async function checkAuth() {
            try {
                const res = await fetch("/api/user", { credentials: "include" });
                if (res.ok) {
                    const data = await res.json();
                    if (Array.isArray(data?.missingProfileFields) && data.missingProfileFields.length) {
                        window.location.href = "/complete-profile.html";
                        return;
                    }
                    const role = data?.user?.role || 'customer';
                    window.location.href = (['employee', 'manager', 'primary', 'technical'].includes(role))
                        ? "/dashboard.html"
                        : "/index.html";
                }
            } catch (error) {
                console.error("Auth check failed:", error);
            }
        }

        function showFormMessage(formId, message, type = 'error') {
            const form = document.getElementById(formId);
            let messageDiv = form.querySelector('.form-message');
            const submitBtn = form.querySelector('.auth-btn');
            if (!messageDiv) {
                messageDiv = document.createElement('div');
                messageDiv.className = 'form-message';
                if (submitBtn) {
                    form.insertBefore(messageDiv, submitBtn);
                } else {
                    form.appendChild(messageDiv);
                }
            }
            messageDiv.textContent = message;
            messageDiv.className = `form-message ${type}`;
        }

        function switchTab(tab) {
            // Update tabs
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.auth-tab[onclick="switchTab('${tab}')"]`).classList.add('active');

            // Update forms
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById(`${tab}-form`).classList.add('active');

            // Update header text
            const header = document.querySelector('.auth-header h1');
            const subheader = document.querySelector('.auth-header p');
            if (tab === 'signin') {
                header.textContent = 'Welcome Back';
                subheader.textContent = 'Sign in to your account or create a new one';
            } else {
                header.textContent = 'Create Account';
                subheader.textContent = 'Join us and start your journey';
            }
        }

        // Form submission handlers
        document.getElementById('signin-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('signin-email').value;
            const password = document.getElementById('signin-password').value;

            try {
                const res = await fetch("/api/login", {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password }),
                });

                const data = await res.json();

                if (!res.ok) {
                    showFormMessage('signin-form', data.error, 'error');
                    return;
                }

                // Successful login
                const role = data?.user?.role || 'customer';
                window.location.href = (['employee', 'manager', 'primary', 'technical'].includes(role))
                    ? "/dashboard.html"
                    : "/index.html";
            } catch (error) {
                showFormMessage('signin-form', "An error occurred during login", 'error');
            }
        });

        document.getElementById('signup-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const phone = document.getElementById('signup-phone').value;
            const age = document.getElementById('signup-age').value;
            const gender = document.getElementById('signup-gender').value;
            const state = document.getElementById('signup-state').value;
            const companyName = document.getElementById('signup-company-name').value;
            const companyLocation = document.getElementById('signup-company-location').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirmPassword = document.getElementById('signup-confirm-password').value;

            if (password !== confirmPassword) {
                showFormMessage('signup-form', "Passwords do not match", 'error');
                return;
            }

            try {
                const res = await fetch("/api/register", {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email,
                        password,
                        name,
                        phone,
                        age,
                        gender,
                        state,
                        companyName,
                        companyLocation
                    }),
                });

                const data = await res.json();

                if (!res.ok) {
                    showFormMessage('signup-form', data.error, 'error');
                    return;
                }

                // Successful registration - switch to login tab
                switchTab('signin');
                document.getElementById('signin-email').value = email;
                showFormMessage('signin-form', "Registration successful! Please sign in.", 'success');
            } catch (error) {
                showFormMessage('signup-form', "An error occurred during registration", 'error');
            }
        });

        // Handle responsive behavior
        function handleResponsive() {
            const isMobile = window.innerWidth <= 768;
            const isLandscape = window.innerHeight < window.innerWidth;
            
            // Adjust padding and margins for mobile landscape
            if (isMobile && isLandscape) {
                document.querySelector('.auth-container').style.padding = '0.5rem';
                document.querySelector('.auth-card').style.padding = '1rem';
            }
        }

        // Initial call
        handleResponsive();
        checkAuth();

        // OAuth social login
        const googleBtn = document.getElementById('google-auth-btn');
        const facebookBtn = document.getElementById('facebook-auth-btn');
        if (googleBtn) {
            googleBtn.addEventListener('click', () => {
                window.location.href = '/auth/google';
            });
        }
        if (facebookBtn) {
            facebookBtn.addEventListener('click', () => {
                window.location.href = '/auth/facebook';
            });
        }

        // Show OAuth errors from callback
        const errorCode = new URLSearchParams(window.location.search).get('error');
        if (errorCode === 'google_auth_failed' || errorCode === 'facebook_auth_failed') {
            showFormMessage('signin-form', 'Social login failed. Please try again.', 'error');
        }

        // Add resize listener
        window.addEventListener('resize', handleResponsive);

        function syncPasswordToggle(btn, input) {
            const hidden = input.type === 'password';
            btn.innerHTML = hidden
                ? '<i class="fas fa-eye-slash"></i>'
                : '<i class="fas fa-eye"></i>';
            btn.setAttribute('aria-label', hidden ? 'Show password' : 'Hide password');
        }

        // Password visibility toggles
        document.querySelectorAll('.toggle-password').forEach((btn) => {
            const targetId = btn.getAttribute('data-target');
            const input = document.getElementById(targetId);
            if (!input) return;
            syncPasswordToggle(btn, input);
            btn.addEventListener('click', () => {
                const hidden = input.type === 'password';
                input.type = hidden ? 'text' : 'password';
                syncPasswordToggle(btn, input);
            });
        });
    </script>
</body>
</html>
