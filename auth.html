<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In / Sign Up - Infinity</title>
    <link rel="icon" href="assets/images/infinity-logo1.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/images/infinity-logo1.png">
    <link rel="stylesheet" href="mazen.css?v=20260506-1">
    <link rel="stylesheet" href="infinity-loader.css?v=20260607">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="form-validation.css?v=20260625">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: var(--light-gray);
        }

        .auth-card {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            width: 100%;
            max-width: min(900px, 96vw);
            padding: clamp(1.25rem, 3vw, 2rem);
            transition: var(--transition);
            box-sizing: border-box;
        }

        .auth-card.auth-card--signin {
            max-width: min(440px, 96vw);
        }

        .auth-card.auth-card--signup {
            max-width: min(900px, 96vw);
        }

        .auth-card:hover {
            box-shadow: var(--hover-shadow);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            color: var(--primary-color);
            font-size: clamp(1.5rem, 4vw, 2rem);
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-light);
            font-size: clamp(0.9rem, 2vw, 1rem);
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border-color);
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: clamp(0.8rem, 2vw, 1rem);
            cursor: pointer;
            color: var(--text-light);
            transition: var(--transition);
            font-weight: 500;
            font-size: clamp(0.9rem, 2vw, 1rem);
        }

        .auth-tab.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            margin-bottom: -2px;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .auth-form.signup-grid.active {
            display: grid;
        }

        .signup-grid {
            display: none;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem 1.25rem;
            align-items: start;
        }

        .signup-grid .form-group {
            margin-bottom: 0;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        body.signup-company .signup-personal-only,
        body.signup-personal .signup-company-only {
            display: none;
        }

        .signup-grid .form-group label {
            margin-bottom: 0.4rem;
        }

        .signup-grid .form-group input,
        .signup-grid .form-group select {
            width: 100%;
            box-sizing: border-box;
        }

        .account-type-group {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
            padding: 0.25rem 0;
        }

        .account-type-option {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            margin: 0;
        }

        .account-type-option input[type="radio"] {
            width: 1rem;
            height: 1rem;
            margin: 0;
            flex-shrink: 0;
            accent-color: var(--primary-color, #0099cc);
        }

        .signup-grid .full-width {
            grid-column: 1 / -1;
        }

        .signup-grid .auth-btn.full-width {
            grid-column: 1 / -1;
            width: 100%;
        }

        .field-optional-tag {
            font-size: .72rem;
            font-weight: 600;
            color: #64748b;
            margin-left: .35rem;
        }

        .country-readonly {
            background: #f1f5f9 !important;
            color: #475569;
            cursor: not-allowed;
        }

        #signin-form .form-group {
            position: relative;
            padding-bottom: 1.25rem;
            margin-bottom: 0;
        }

        #signin-form .forgot-password {
            margin-top: -0.5rem;
            margin-bottom: 0.5rem;
        }

        #signin-form .auth-btn {
            margin-top: 0.25rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            font-weight: 500;
            font-size: clamp(0.9rem, 2vw, 1rem);
        }

        .form-group input {
            width: 100%;
            padding: clamp(0.7rem, 2vw, 0.8rem);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            transition: var(--transition);
            font-size: clamp(0.9rem, 2vw, 1rem);
        }

        .password-field {
            position: relative;
        }

        .password-field input {
            padding-right: 2.6rem;
        }

        .toggle-password {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: var(--text-light);
            cursor: pointer;
            padding: 0.2rem;
            font-size: 1rem;
        }

        .toggle-password:hover {
            color: var(--primary-color);
        }

        .form-group select {
            width: 100%;
            padding: clamp(0.7rem, 2vw, 0.8rem);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            transition: var(--transition);
            font-size: clamp(0.9rem, 2vw, 1rem);
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(0, 153, 204, 0.1);
        }

        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(0, 153, 204, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: clamp(0.8rem, 2vw, 1rem);
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-size: clamp(0.9rem, 2vw, 1rem);
        }

        .auth-btn:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        .social-auth {
            margin-top: 2rem;
            text-align: center;
        }

        .social-auth p {
            color: var(--text-light);
            margin-bottom: 1rem;
            font-size: clamp(0.9rem, 2vw, 1rem);
        }

        .social-buttons {
            display: flex;
            gap: clamp(0.5rem, 2vw, 1rem);
            justify-content: center;
            flex-wrap: wrap;
        }

        .social-btn {
            padding: clamp(0.7rem, 2vw, 0.8rem);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            background: white;
            color: var(--text-color);
            cursor: pointer;
            transition: var(--transition);
            min-width: clamp(2.5rem, 8vw, 3rem);
            height: clamp(2.5rem, 8vw, 3rem);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-btn:hover {
            background: var(--light-gray);
            color: var(--primary-color);
            transform: translateY(-2px);
        }

        .social-btn i {
            font-size: clamp(1rem, 3vw, 1.2rem);
        }

        .forgot-password {
            text-align: right;
            margin-top: -1rem;
            margin-bottom: 1.5rem;
        }

        .forgot-password a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .form-message {
            margin-top: 0.5rem;
            margin-bottom: 0.75rem;
            padding: 0.65rem 0.8rem;
            border-radius: 10px;
            font-size: 0.9rem;
            border: 1px solid transparent;
        }

        .form-message.error {
            color: #991b1b;
            background: #fee2e2;
            border-color: #fecaca;
        }

        .form-message.success {
            color: #166534;
            background: #dcfce7;
            border-color: #86efac;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .auth-container {
                padding: 1rem;
            }

            .auth-card {
                padding: 1.5rem;
            }

            .social-buttons {
                gap: 0.5rem;
            }

            .signup-grid.active {
                grid-template-columns: 1fr;
            }
        }

        @media (min-width: 900px) {
            .auth-card.auth-card--signup {
                padding: clamp(1.5rem, 3vw, 2.25rem);
            }
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 0.5rem;
            }

            .auth-card {
                padding: 1rem;
            }

            .auth-tabs {
                margin-bottom: 1.5rem;
            }

            .form-group {
                margin-bottom: 1rem;
            }
        }

        /* Tablet: keep sign-up wide; sign-in stays compact */
        @media (min-width: 769px) and (max-width: 1024px) {
            .auth-card.auth-card--signin {
                max-width: min(440px, 96vw);
            }
            .auth-card.auth-card--signup {
                max-width: min(900px, 96vw);
            }
        }

        /* Landscape Mode */
        @media (max-height: 600px) and (orientation: landscape) {
            .auth-container {
                padding: 1rem;
            }

            .auth-card {
                padding: 1.5rem;
            }

            .form-group {
                margin-bottom: 1rem;
            }
        }
    </style>
</head>

    <script>
        // Check if user is already logged in
        async function checkAuth() {
            try {
                const res = await fetch("/api/user", { credentials: "include" });
                if (res.ok) {
                    const data = await res.json();
                    if (Array.isArray(data?.missingProfileFields) && data.missingProfileFields.length) {
                        window.location.href = "/complete-profile.html";
                        return;
                    }
                    const role = data?.user?.role || 'customer';
                    window.location.href = (['employee', 'manager', 'primary', 'technical'].includes(role))
                        ? "/dashboard.html"
                        : "/index.html";
                }
            } catch (error) {
                console.error("Auth check failed:", error);
            }
        }

        function showFormMessage(formId, message, type = 'error') {
            const form = document.getElementById(formId);
            let messageDiv = form.querySelector('.form-message');
            const submitBtn = form.querySelector('.auth-btn');
            if (!messageDiv) {
                messageDiv = document.createElement('div');
                messageDiv.className = 'form-message';
                if (submitBtn) {
                    form.insertBefore(messageDiv, submitBtn);
                } else {
                    form.appendChild(messageDiv);
                }
            }
            messageDiv.textContent = message;
            messageDiv.className = `form-message ${type}`;
        }

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.auth-tab[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById(`${tab}-form`).classList.add('active');
            const card = document.querySelector('.auth-card');
            card?.classList.toggle('auth-card--signin', tab === 'signin');
            card?.classList.toggle('auth-card--signup', tab === 'signup');
            const header = document.querySelector('.auth-header h1');
            const subheader = document.querySelector('.auth-header p');
            if (tab === 'signin') {
                header.textContent = 'Welcome Back';
                subheader.textContent = 'Sign in to your account or create a new one';
            } else {
                header.textContent = 'Create Account';
                subheader.textContent = 'Join us and start your journey';
            }
        }

        function computeAgeFromDob(dob) {
            if (!dob) return null;
            const birth = new Date(dob);
            if (Number.isNaN(birth.getTime())) return null;
            const today = new Date();
            let age = today.getFullYear() - birth.getFullYear();
            const m = today.getMonth() - birth.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age -= 1;
            return age;
        }

        function cloneCompanyStateOptions() {
            const src = document.getElementById('signup-state');
            const dst = document.getElementById('signup-company-state');
            if (src && dst && dst.options.length === 0) dst.innerHTML = src.innerHTML;
        }

        function getSignupAccountType() {
            const checked = document.querySelector('input[name="account-type"]:checked');
            return checked?.value === 'company' ? 'company' : 'personal';
        }

        function syncSignupAccountType() {
            const type = getSignupAccountType();
            document.body.classList.toggle('signup-company', type === 'company');
            document.body.classList.toggle('signup-personal', type === 'personal');
            const personalFields = ['signup-name', 'signup-phone', 'signup-age', 'signup-gender', 'signup-state', 'signup-city', 'signup-address'];
            const companyFields = ['signup-company-name-req', 'signup-contact-person', 'signup-company-phone', 'signup-company-address', 'signup-company-city', 'signup-company-state'];
            personalFields.forEach((id) => {
                const el = document.getElementById(id);
                if (el) el.required = type === 'personal';
            });
            companyFields.forEach((id) => {
                const el = document.getElementById(id);
                if (el) el.required = type === 'company';
            });
            if (window.FormValidation) {
                document.querySelectorAll('#signup-form .signup-personal-only, #signup-form .signup-company-only').forEach((group) => {
                    const isHidden = (type === 'personal' && group.classList.contains('signup-company-only'))
                        || (type === 'company' && group.classList.contains('signup-personal-only'));
                    if (!isHidden) return;
                    group.querySelectorAll('input, select, textarea').forEach((input) => {
                        FormValidation.clearFieldError(input);
                    });
                });
            }
        }

        cloneCompanyStateOptions();
        document.querySelectorAll('input[name="account-type"]').forEach((radio) => {
            radio.addEventListener('change', syncSignupAccountType);
        });
        syncSignupAccountType();

        const authCard = document.querySelector('.auth-card');
        authCard?.classList.add('auth-card--signin');

        // Form submission handlers
        document.getElementById('signin-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = this.querySelector('button[type="submit"]');
            if (window.InfinityLoader && submitBtn) InfinityLoader.setButtonLoading(submitBtn, true);
            const email = document.getElementById('signin-email').value;
            const password = document.getElementById('signin-password').value;

            try {
                const res = await fetch("/api/login", {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password }),
                });

                const data = await res.json();

                if (!res.ok) {
                    if (data.code === 'EMAIL_NOT_VERIFIED') {
                        const pendingEmail = data.email || email;
                        sessionStorage.setItem('pending_verify_email', pendingEmail);
                        showFormMessage('signin-form', 'Please verify your email first.', 'error');
                        setTimeout(() => {
                            window.location.href = `/verify-email.html?email=${encodeURIComponent(pendingEmail)}`;
                        }, 1200);
                        return;
                    }
                    showFormMessage('signin-form', data.error, 'error');
                    return;
                }

                // Successful login
                const role = data?.user?.role || 'customer';
                window.location.href = (['employee', 'manager', 'primary', 'technical'].includes(role))
                    ? "/dashboard.html"
                    : "/index.html";
            } catch (error) {
                showFormMessage('signin-form', "An error occurred during login", 'error');
            } finally {
                if (window.InfinityLoader && submitBtn) InfinityLoader.setButtonLoading(submitBtn, false);
            }
        });

        const signupForm = document.getElementById('signup-form');
        if (window.FormValidation && signupForm) {
            FormValidation.attachSignupValidation(signupForm);
        }

        signupForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            if (window.FormValidation && !FormValidation.validateSignupForm(this)) {
                return;
            }

            const submitBtn = this.querySelector('button[type="submit"]');
            const accountType = getSignupAccountType();
            const name = document.getElementById('signup-name').value.trim();
            const contactPerson = document.getElementById('signup-contact-person').value.trim();
            const companyName = document.getElementById('signup-company-name-req').value.trim();
            const phoneRaw = accountType === 'company'
                ? document.getElementById('signup-company-phone').value
                : document.getElementById('signup-phone').value;
            const phone = phoneRaw.replace(/\D/g, '');
            const gender = document.getElementById('signup-gender').value;
            const state = accountType === 'company'
                ? document.getElementById('signup-company-state').value
                : document.getElementById('signup-state').value;
            const address = accountType === 'company'
                ? document.getElementById('signup-company-address').value.trim()
                : document.getElementById('signup-address').value.trim();
            const city = accountType === 'company'
                ? document.getElementById('signup-company-city').value.trim()
                : document.getElementById('signup-city').value.trim();
            const dateOfBirth = document.getElementById('signup-dob').value;
            const ageInput = document.getElementById('signup-age')?.value;
            const age = accountType === 'personal'
                ? (ageInput ? Number(ageInput) : computeAgeFromDob(dateOfBirth))
                : null;
            const taxNumber = document.getElementById('signup-tax').value.trim();
            const companyWebsite = document.getElementById('signup-website').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirmPassword = document.getElementById('signup-confirm-password').value;

            if (window.InfinityLoader && submitBtn) InfinityLoader.setButtonLoading(submitBtn, true);
            try {
                const res = await fetch("/api/register", {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email,
                        password,
                        accountType,
                        name: accountType === 'personal' ? name : contactPerson,
                        contactPerson,
                        phone,
                        age,
                        gender,
                        state,
                        address,
                        city,
                        country: 'Egypt',
                        dateOfBirth: dateOfBirth || null,
                        companyName,
                        companyAddress: address,
                        taxNumber,
                        companyWebsite,
                    }),
                });

                const data = await res.json();

                if (!res.ok) {
                    showFormMessage('signup-form', data.error, 'error');
                    return;
                }

                if (data.requiresVerification) {
                    sessionStorage.setItem('pending_verify_email', data.email || email);
                    sessionStorage.setItem('pending_verify_sent_at', String(Date.now()));
                    sessionStorage.setItem('pending_verify_expires', String(Date.now() + 15 * 60 * 1000));
                    window.location.href = `/verify-email.html?email=${encodeURIComponent(data.email || email)}`;
                    return;
                }

                // Staff registration — switch to login tab
                switchTab('signin');
                document.getElementById('signin-email').value = email;
                showFormMessage('signin-form', "Registration successful! Please sign in.", 'success');
            } catch (error) {
                showFormMessage('signup-form', "An error occurred during registration", 'error');
            } finally {
                if (window.InfinityLoader && submitBtn) InfinityLoader.setButtonLoading(submitBtn, false);
            }
        });

        // Handle responsive behavior
        function handleResponsive() {
            const container = document.querySelector('.auth-container');
            const card = document.querySelector('.auth-card');
            const isMobileLandscape = window.innerWidth <= 768 && window.innerHeight < window.innerWidth;
            if (container) container.style.padding = isMobileLandscape ? '0.5rem' : '';
            if (card) card.style.padding = isMobileLandscape ? '1rem' : '';
        }

        // Initial call
        handleResponsive();
        checkAuth();

        // OAuth social login
        const googleBtn = document.getElementById('google-auth-btn');
        const facebookBtn = document.getElementById('facebook-auth-btn');
        if (googleBtn) {
            googleBtn.addEventListener('click', () => {
                window.location.href = '/auth/google';
            });
        }
        if (facebookBtn) {
            facebookBtn.addEventListener('click', () => {
                window.location.href = '/auth/facebook';
            });
        }

        // Show OAuth errors from callback
        const urlParams = new URLSearchParams(window.location.search);
        const errorCode = urlParams.get('error');
        if (errorCode === 'google_auth_failed' || errorCode === 'facebook_auth_failed') {
            showFormMessage('signin-form', 'Social login failed. Please try again.', 'error');
        }

        if (urlParams.get('verified') === '1') {
            switchTab('signin');
            showFormMessage('signin-form', 'Email verified! You can now sign in.', 'success');
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        if (urlParams.get('reset') === 'success') {
            switchTab('signin');
            showFormMessage(
                'signin-form',
                'Password changed successfully. Please sign in with your new password.',
                'success'
            );
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // Add resize listener
        window.addEventListener('resize', handleResponsive);

        function syncPasswordToggle(btn, input) {
            const hidden = input.type === 'password';
            btn.innerHTML = hidden
                ? '<i class="fas fa-eye-slash"></i>'
                : '<i class="fas fa-eye"></i>';
            btn.setAttribute('aria-label', hidden ? 'Show password' : 'Hide password');
        }

        // Password visibility toggles
        document.querySelectorAll('.toggle-password').forEach((btn) => {
            const targetId = btn.getAttribute('data-target');
            const input = document.getElementById(targetId);
            if (!input) return;
            syncPasswordToggle(btn, input);
            btn.addEventListener('click', () => {
                const hidden = input.type === 'password';
                input.type = hidden ? 'text' : 'password';
                syncPasswordToggle(btn, input);
            });
        });
    </script>
</body>
