<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Code - INFINITY</title>
    <link rel="icon" href="assets/images/infinity-logo1.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/images/infinity-logo1.png">
    <link rel="stylesheet" href="mazen.css?v=20260506-1">
    <link rel="stylesheet" href="infinity-loader.css?v=20260607">
    <link rel="stylesheet" href="password-reset.css?v=20260620">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="pr-page">
    <div class="pr-wrap">
        <div class="pr-card">
            <a href="forgot-password.html" class="pr-back" aria-label="Back to forgot password"><i class="fas fa-arrow-left" aria-hidden="true"></i> Change email</a>
            <div class="pr-steps" aria-hidden="true">
                <span class="pr-step done"></span>
                <span class="pr-step active"></span>
                <span class="pr-step"></span>
            </div>
            <img src="assets/images/infinity-logo1.png" alt="" class="pr-logo" width="56" height="56">
            <h1 class="pr-title">Verify Code</h1>
            <p class="pr-sub">Enter the 6-digit code sent to <strong id="otp-email-display"></strong></p>

            <form id="verify-form" novalidate>
                <div class="pr-otp-row" role="group" aria-label="6-digit verification code">
                    <input class="pr-otp-box" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 1 of 6">
                    <input class="pr-otp-box" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 2 of 6">
                    <input class="pr-otp-box" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 3 of 6">
                    <input class="pr-otp-box" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 4 of 6">
                    <input class="pr-otp-box" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 5 of 6">
                    <input class="pr-otp-box" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 6 of 6">
                </div>
                <p class="pr-timer" id="otp-timer" aria-live="polite">Code expires in <strong>10:00</strong></p>
                <button type="submit" class="pr-btn" id="verify-submit">Verify code</button>
                <div class="pr-resend">
                    <button type="button" id="resend-btn" data-base-label="Resend code">Resend code</button>
                    <span id="resend-hint" class="sr-only" aria-live="polite"></span>
                </div>
                <div id="verify-msg" class="pr-msg" aria-live="polite"></div>
            </form>
        </div>
    </div>

    <script src="infinity-loader.js?v=20260607"></script>
    <script src="connectivity.js?v=20260607"></script>
    <script src="password-reset.js?v=20260620"></script>
    <script>
        (function () {
            const {
                getRecoveryEmail, setExpiresAt, setResetToken, showMessage, hideMessage,
                apiPost, initOtpInputs, startExpiryTimer, startResendCooldown, GENERIC_REQUEST_MESSAGE
            } = PasswordResetUI;

            const email = getRecoveryEmail();
            if (!email) {
                window.location.replace('forgot-password.html');
                return;
            }

            if (window.InfinityLoader) InfinityLoader.startPageEnter();

            document.getElementById('otp-email-display').textContent = email;

            const form = document.getElementById('verify-form');
            const otpRow = form.querySelector('.pr-otp-row');
            const verifyBtn = document.getElementById('verify-submit');
            const resendBtn = document.getElementById('resend-btn');
            const resendHint = document.getElementById('resend-hint');
            const timerEl = document.getElementById('otp-timer');
            const msg = document.getElementById('verify-msg');

            let expiresAtIso = sessionStorage.getItem('pr_expires_at') || '';

            const otpApi = initOtpInputs(otpRow);

            function refreshTimer() {
                startExpiryTimer({
                    expiresAtIso,
                    timerEl,
                    verifyBtn,
                    onExpired: () => showMessage(msg, 'Code expired. Request a new code to continue.', 'error'),
                });
            }

            refreshTimer();

            async function submitOtp(otp) {
                if (!/^\d{6}$/.test(otp)) {
                    showMessage(msg, 'Please enter a valid 6-digit code.', 'error');
                    otpApi.inputs.forEach((i) => i.classList.add('is-invalid'));
                    return;
                }

                hideMessage(msg);
                if (window.InfinityLoader) InfinityLoader.setButtonLoading(verifyBtn, true);
                try {
                    const data = await apiPost('/api/password-reset/verify', { email, otp });
                    setResetToken(data.resetToken);
                    window.location.href = 'reset-password.html';
                } catch (err) {
                    showMessage(msg, err.message || 'Invalid verification code.', 'error');
                    if (err.code === 'EXPIRED' || err.code === 'LOCKED') {
                        verifyBtn.disabled = true;
                        otpApi.inputs.forEach((i) => { i.disabled = true; });
                    } else {
                        otpApi.clear();
                    }
                } finally {
                    if (window.InfinityLoader) InfinityLoader.setButtonLoading(verifyBtn, false);
                }
            }

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                submitOtp(otpApi.getValue());
            });

            resendBtn.addEventListener('click', async () => {
                hideMessage(msg);
                resendBtn.disabled = true;
                if (window.InfinityLoader) InfinityLoader.showFullscreen('Sending new code…');
                try {
                    const data = await apiPost('/api/password-reset/resend', { email });
                    expiresAtIso = data.expiresAt;
                    setExpiresAt(expiresAtIso);
                    otpApi.inputs.forEach((i) => { i.disabled = false; });
                    otpApi.clear();
                    showMessage(msg, data.message || GENERIC_REQUEST_MESSAGE, 'success');
                    refreshTimer();
                    startResendCooldown(resendBtn, 60, resendHint);
                } catch (err) {
                    showMessage(msg, err.message || 'Could not resend code. Please try again.', 'error');
                    resendBtn.disabled = false;
                } finally {
                    if (window.InfinityLoader) InfinityLoader.hideFullscreen();
                }
            });

            startResendCooldown(resendBtn, 60, resendHint);
        })();
    </script>
</body>
</html>
