    <style>
        /* Full-width-friendly layout; scoped so global nav styles stay intact */
        body.product-details-page { background: #e8eef5; }
        /* Avoid scroll-reveal hiding product content on load */
        body.product-details-page section.fade-in {
            opacity: 1 !important;
            transform: none !important;
            transition: none !important;
        }
        body.product-details-page .cart-sidebar {
            z-index: 2200;
        }
        body.product-details-page .home-quick-nav-cart.cart-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 48px;
            min-height: 48px;
            margin-left: 0;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }
        body.product-details-page .cart-icon:hover {
            background: rgba(8, 145, 178, 0.1);
            color: var(--primary-color);
        }
        body.product-details-page .cart-icon i,
        body.product-details-page .cart-icon .cart-count {
            pointer-events: none;
        }
        .details-wrap {
            width: 100%;
            max-width: 1280px;
            margin: 7rem auto 2.1rem;
            padding: 0 1rem;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 1.15rem;
        }
        .details-head {
            display: grid;
            grid-template-columns: minmax(280px, 360px) 1fr;
            gap: 0;
            margin: 0;
            align-items: stretch;
            background: linear-gradient(135deg, #ffffff 0%, #f8fbff 100%);
            border: 1px solid #dbe7f3;
            border-radius: 16px;
            box-shadow: 0 14px 34px rgba(15, 23, 42, 0.1);
            overflow: hidden;
        }
        .details-media, .details-summary, .details-specs {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            box-shadow: 0 6px 18px rgba(2, 6, 23, .06);
        }
        .details-head .details-media,
        .details-head .details-summary {
            border: none;
            border-radius: 0;
            box-shadow: none;
            background: transparent;
        }
        .details-head .details-media {
            padding: 1.1rem;
            background: #fff;
            border-right: 1px solid #dbe7f3;
            display: grid;
            place-items: center;
            min-height: 0;
        }
        .details-head .details-media img {
            width: 100%;
            max-width: min(285px, 100%);
            max-height: 215px;
            object-fit: contain;
            filter: none;
        }
        .details-head .details-summary {
            padding: 1.25rem 1.45rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.45rem;
        }
        .details-summary h1 {
            margin: 0;
            color: #0f172a;
            font-size: clamp(1.15rem, 2vw, 1.38rem);
            line-height: 1.2;
        }
        .details-summary .arabic {
            margin: 0;
            color: #334155;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .details-price {
            color: #0f766e;
            font-size: 1.1rem;
            font-weight: 800;
            margin-top: 0.2rem;
        }
        .details-install {
            color: #475569;
            font-size: 0.92rem;
            font-weight: 500;
            margin-top: 0;
        }
        .details-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.55rem;
            margin-top: 0.5rem;
            padding-top: 0.7rem;
            border-top: 1px solid #e5edf6;
        }
        .details-actions .btn {
            border: none;
            border-radius: 11px;
            padding: 0.65rem 1.05rem;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.92rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #0891b2, #0e7490);
            color: #fff;
            box-shadow: 0 8px 18px rgba(8, 145, 178, 0.28);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
        }
        .btn-ghost {
            background: #e2e8f0;
            color: #0f172a;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .details-specs {
            padding: 1.15rem 1.2rem 1.2rem;
            margin-top: 0;
            flex: 1;
            background: #fff;
            border: 1px solid #dbe7f3;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }
        .details-specs h2 {
            margin: 0 0 .7rem;
            color: #0f172a;
            font-size: 1.08rem;
            font-weight: 800;
            letter-spacing: -0.01em;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: .55rem;
        }
        .specs-paper {
            display: grid;
            gap: .95rem;
        }
        .spec-section {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: .75rem .85rem;
            background: #fff;
        }
        .spec-section h3 {
            margin: 0 0 .55rem;
            font-size: .95rem;
            color: #0f172a;
        }
        .spec-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: .45rem;
        }
        .spec-line {
            border-bottom: 1px dashed #e2e8f0;
            padding-bottom: .45rem;
        }
        .spec-line:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .spec-line .ar {
            margin: 0;
            color: #1f2937;
            font-family: 'Cairo', sans-serif;
            font-size: .9rem;
            direction: rtl;
            text-align: right;
            line-height: 1.5;
        }
        .spec-line .en {
            margin: .18rem 0 0;
            color: #64748b;
            font-size: .82rem;
            line-height: 1.45;
        }
        .theme-toast {
            position: fixed;
            right: 1rem;
            bottom: 1rem;
            z-index: 2300;
            max-width: min(22rem, calc(100vw - 2rem));
            background: linear-gradient(135deg, #0f766e, #0891b2);
            color: #fff;
            padding: 0.85rem 1.25rem;
            border-radius: 999px;
            box-shadow: 0 12px 28px rgba(2, 6, 23, 0.22), 0 0 0 1px rgba(255, 255, 255, 0.12) inset;
            font-family: 'Poppins', system-ui, sans-serif;
            font-weight: 600;
            font-size: 0.92rem;
            line-height: 1.35;
            display: flex;
            align-items: center;
            gap: 0.55rem;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            transition: opacity 0.22s ease, transform 0.22s ease;
        }
        .theme-toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .theme-toast.error {
            background: linear-gradient(135deg, #b91c1c, #ef4444);
        }
        .theme-toast.error::before,
        .theme-toast.warning::before {
            flex-shrink: 0;
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 1rem;
            line-height: 1;
            opacity: 0.95;
        }
        .theme-toast.error::before { content: '\f06a'; }
        .theme-toast.warning {
            background: linear-gradient(135deg, #0d9488, #0891b2);
        }
        .theme-toast.warning::before { content: '\f071'; }
        @media (max-width: 680px) {
            .theme-toast {
                left: 50%;
                right: auto;
                bottom: max(1.25rem, calc(env(safe-area-inset-bottom, 0px) + 1rem));
                max-width: min(20rem, calc(100vw - 1.5rem));
                transform: translate(-50%, 12px);
                justify-content: center;
                text-align: center;
            }
            .theme-toast.show {
                transform: translate(-50%, 0);
            }
        }
        @media (max-width: 860px) {
            .details-head { grid-template-columns: 1fr; }
            .details-head .details-media {
                border-right: none;
                border-bottom: 1px solid #dbe7f3;
            }
            .details-wrap { margin-top: 7.3rem; }
            .details-head .details-media img { max-height: 200px; }
            .details-head .details-summary { padding: 0.95rem 1rem; }
            .details-specs { padding: 1rem .85rem 1rem; }
            .spec-section { padding: .68rem .72rem; }
        }
    </style>

    <script>
        (function () {
        const PRODUCT_DATA = {
            'fmb120': {
                name: 'GPS Tracker FMB120',
                arabicName: 'جهاز تتبع FMB120',
                image: 'assets/products/fmb120.png',
                price: 3475,
                installation: 325,
                specSections: [
                    {
                        title: '1. الخصائص العامة',
                        items: [
                            { en: 'Manufacturer: Teltonika, Lithuania', ar: 'بلد الصنع: ليتوانيا شركة Teltonika' },
                            { en: 'Tracking System: GPS/GSM', ar: 'نظام التتبع: GPS/GSM' },
                            { en: 'Connectivity: GSM network support (2G/3G/4G)', ar: 'الاتصال: GSM يدعم شبكة (2G/3G/4G)' },
                            { en: 'Battery backup works up to 12 hours if vehicle battery is disconnected', ar: 'البطارية: بطارية احتياطية تعمل حتى 12 ساعة في حالة فصل بطارية السيارة' },
                            { en: 'Installation: Easy installation with no vehicle modifications required', ar: 'التركيب: سهل التركيب ولا يتطلب تعديلات في السيارة' },
                            { en: 'Tracking: Real-time vehicle tracking via mobile app or computer', ar: 'التتبع: يمكن تتبع السيارة في الوقت الفعلي عبر التطبيق او الكمبيوتر' }
                        ]
                    },
                    {
                        title: '2. الميزات الفنية',
                        items: [
                            { en: 'Current Location: High-precision real-time vehicle location tracking', ar: 'تحديد الموقع الحالي: يمكن تحديد موقع السيارة في الوقت الحالي بدقة عالية' },
                            { en: 'Reporting: Provides reports on speed, stops, parking, and more', ar: 'إصدار التقارير: توفير تقارير عن السرعة، الوقوف، التوقفات وغيرها' },
                            { en: 'Fleet Management: Efficient vehicle fleet management support', ar: 'إدارة الأساطيل: يدعم إدارة أساطيل المركبات بفعالية' },
                            { en: 'Security Alerts: Sends notifications for tampering or battery disconnection', ar: 'تنبيهات الأمان: ترسل تنبيهات في حالة العبث او فصل البطارية' },
                            { en: 'Route History: Can retrieve vehicle route history for any past period', ar: 'استعادة خط السير: يمكن استعادة خط سير السيارة لأي فترة زمنية سابقة' }
                        ]
                    },
                    {
                        title: '3. الخدمات التي يوفرها الجهاز',
                        items: [
                            { en: 'Distance Report: Shows total kilometers traveled by the vehicle', ar: 'تقرير المسافة المقطوعة: تظهير عدد الكيلومترات التي يقطعها السيارة' },
                            { en: 'Fuel Consumption Report: Provides reports on fuel consumption', ar: 'تقرير استهلاك الوقود: يوفر تقارير عن استهلاك الوقود' },
                            { en: 'Speed Report: Shows overspeeding incidents with location and time', ar: 'تقرير السرعة الزائدة: تظهير السرعة الزائدة وأماكنها ووقتها' },
                            { en: 'Geofencing: Ability to set geographic zones and receive alerts', ar: 'تحديد المناطق الجغرافية: إمكانية تحديد منطقة جغرافية معينة وإرسال تنبيه' },
                            { en: 'Remote Engine Cut-off: Ability to remotely stop the vehicle engine via mobile', ar: 'إيقاف المحرك عن بعد: إمكانية إيقاف محرك السيارة عن بعد عبر الموبايل' },
                            { en: 'Microphone: Sensitive microphone for in-vehicle listening (not currently available)', ar: 'الميكروفون: مايك حساس للاستماع داخل السيارة (لا يوجد في الوقت الحالي)' }
                        ]
                    }
                ]
            },
            'cut-off': {
                name: 'Cut Off Engine',
                arabicName: 'حساس فصل المحرك',
                image: 'assets/products/cut-off-engine.png',
                price: 170,
                installation: 80,
                specs: [
                    { en: 'Remote engine cut-off for anti-theft', ar: 'إيقاف المحرك عن بعد في حالات السرقة' },
                    { en: 'Fast installation and reliable control', ar: 'تركيب سريع وتحكم موثوق' },
                    { en: 'Compatible with tracking devices', ar: 'متوافق مع أجهزة التتبع' }
                ]
            },
            'door-sensor': {
                name: 'Door Sensor',
                arabicName: 'حساس باب',
                image: 'assets/products/door-sensor.png',
                price: 240,
                installation: 350,
                specs: [
                    { en: 'Monitors door open/close events', ar: 'يراقب فتح وغلق باب السيارة' },
                    { en: 'Instant notification alerts', ar: 'إشعارات فورية عند الفتح والغلق' },
                    { en: 'Supports security and trip auditing', ar: 'يدعم الأمان ومراجعة الرحلات' }
                ]
            },
            'driver-button': {
                name: 'Driver ID Button',
                arabicName: 'حساس Button | تعريف السائق',
                image: 'assets/products/driver-button.png',
                price: 1220,
                installation: 0,
                specs: [
                    { en: 'Driver authentication per trip', ar: 'تعريف السائق لكل رحلة' },
                    { en: 'Improves fleet driver accountability', ar: 'يحسن متابعة السائقين في الأسطول' },
                    { en: 'Links driver activity with vehicle usage', ar: 'ربط نشاط السائق بحركة السيارة' }
                ]
            }
        };

        const fallbackImage = 'assets/images/infinity-logo.png';
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id') || 'fmb120';
        let product = PRODUCT_DATA[id]
            ? { ...PRODUCT_DATA[id] }
            : { name: 'Product', arabicName: '', image: fallbackImage, price: 0, installation: 0, specs: [], specSections: [] };

        const imageEl = document.getElementById('product-image');
        const specsList = document.getElementById('specs-list') || document.querySelector('.specs-paper');
        const specsHost = document.querySelector('.details-specs');
        const detailsWrap = document.querySelector('.details-wrap');

        function showDetailsSkeleton() {
            if (!detailsWrap || !window.InfinityLoader) return;
            if (!detailsWrap.querySelector('.details-skeleton')) {
                const holder = document.createElement('div');
                holder.innerHTML = InfinityLoader.skeletonProductDetail();
                if (holder.firstElementChild) {
                    detailsWrap.insertBefore(holder.firstElementChild, detailsWrap.firstElementChild);
                }
            }
            detailsWrap.classList.add('is-details-loading');
        }

        function hideDetailsSkeleton() {
            detailsWrap?.classList.remove('is-details-loading');
            detailsWrap?.querySelector('.details-skeleton')?.remove();
        }

        showDetailsSkeleton();

        function sectionizeSpecs(base) {
            const fromSections = Array.isArray(base.specSections)
                ? base.specSections
                    .map((sec) => ({
                        title: sec?.title || '',
                        items: (sec?.items || []).filter((s) => s && (s.en || s.ar))
                    }))
                    .filter((sec) => sec.title && sec.items.length)
                : [];
            if (fromSections.length) return fromSections;

            const specs = Array.isArray(base.specs) ? base.specs.filter((s) => s && (s.en || s.ar)) : [];
            if (id === 'fmb120' && specs.length > 6) {
                return [
                    { title: '1. الخصائص العامة', items: specs.slice(0, 6) },
                    { title: '2. الميزات الفنية', items: specs.slice(6, 11) },
                    { title: '3. الخدمات التي يوفرها الجهاز', items: specs.slice(11) }
                ];
            }
            if (specs.length) {
                return [{ title: '1. المواصفات الفنية', items: specs }];
            }
            return [];
        }

        function renderSpecs() {
            const target = specsList || specsHost;
            if (!target) return;
            // Smoke marker: if you ever see nothing here, script didn't run.
            target.innerHTML = '<div class="muted" style="padding:.6rem 0;">Loading specifications…</div>';
            try {
                const base = product;
                const sections = sectionizeSpecs(base)
                    .map((sec) => ({ ...sec, items: (sec.items || []).filter(Boolean) }))
                    .filter((sec) => (sec.items || []).length);

                const html = sections.map((section) => `
<div class="spec-section">
  <h3>${section.title}</h3>
  <ul class="spec-list">
    ${(section.items || []).map((s) => `
    <li class="spec-line">
      <p class="ar">&bull; ${s.ar || ''}</p>
      <p class="en">${s.en || ''}</p>
    </li>`).join('')}
  </ul>
</div>
`).join('');

                target.innerHTML = html || '<div class="muted">No specifications available.</div>';
            } catch (e) {
                const target = specsList || specsHost;
                if (target) target.innerHTML = '<div class="muted">Failed to load specifications.</div>';
            }
        }

        function applyProductToPage() {
            document.getElementById('product-name').textContent = product.name;
            document.getElementById('product-name-ar').textContent = product.arabicName || '';
            document.getElementById('product-price').textContent = `Price: EGP ${Number(product.price || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            document.getElementById('product-install').textContent = `Installation: EGP ${Number(product.installation || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            imageEl.src = product.image || fallbackImage;
            imageEl.alt = product.name;
            renderSpecs();
        }

        function mapApiProductToView(p) {
            const apiSections = Array.isArray(p.specSections)
                ? p.specSections
                    .map((sec) => ({
                        title: sec?.title || '',
                        items: (sec?.items || []).filter((s) => s && (s.en || s.ar))
                    }))
                    .filter((sec) => sec.title && sec.items.length)
                : [];
            const apiSpecs = Array.isArray(p.specs) ? p.specs.filter((s) => s && (s.en || s.ar)) : [];
            const fallbackSpecs = [];
            if (p.descriptionEn || p.descriptionAr) {
                fallbackSpecs.push({ en: p.descriptionEn || '', ar: p.descriptionAr || p.descriptionEn || '' });
            }
            const specSections = apiSections.length
                ? apiSections
                : (apiSpecs.length ? [{ title: '1. المواصفات الفنية', items: apiSpecs }] : (fallbackSpecs.length ? [{ title: '1. المواصفات الفنية', items: fallbackSpecs }] : []));
            return {
                name: p.name || 'Product',
                arabicName: p.nameAr || '',
                image: p.image || fallbackImage,
                price: Number(p.price || 0),
                installation: Number(p.installation || 0),
                specs: specSections.flatMap((sec) => sec.items),
                specSections
            };
        }

        function mergeLiveProduct(p) {
            if (!p || p.productId !== id) return;
            const mapped = mapApiProductToView(p);
            product = {
                ...product,
                ...mapped,
                name: p.name || product.name,
                arabicName: p.nameAr || product.arabicName,
                image: p.image || product.image,
                price: typeof p.price === 'number' ? p.price : product.price,
                installation: typeof p.installation === 'number' ? p.installation : product.installation,
                specSections: mapped.specSections.length ? mapped.specSections : product.specSections,
                specs: mapped.specs.length ? mapped.specs : product.specs
            };
            PRODUCT_DATA[id] = { ...product };
            applyProductToPage();
        }

        async function loadProductFromApi() {
            try {
                const res = await fetch(`/api/products/public/${encodeURIComponent(id)}`);
                if (!res.ok) return;
                const data = await res.json();
                const p = data.product;
                if (!p) return;
                const mapped = mapApiProductToView(p);
                if (!PRODUCT_DATA[id]) {
                    product = mapped;
                } else if (Array.isArray(p.specSections) && p.specSections.length) {
                    product = { ...product, specSections: mapped.specSections, specs: mapped.specs };
                }
                PRODUCT_DATA[id] = { ...(PRODUCT_DATA[id] || {}), ...product };
                applyProductToPage();
            } catch (_e) { /* ignore */ }
            finally {
                hideDetailsSkeleton();
            }
        }

        applyProductToPage();
        loadProductFromApi();

        // When navigating away/back, browsers may restore from bfcache and skip running scripts.
        // Re-render on pageshow so Specifications never appears empty.
        window.addEventListener('pageshow', async () => {
            try {
                await loadProductFromApi();
                applyProductToPage();
                renderSpecs();
                updateCart();
            } catch (_e) { /* ignore */ }
        });

        let cart = [];
        let isLoggedIn = false;
        let productStockMap = {};
        let cartUserMutated = false;
        let toastTimer;

        const cartIcon = document.querySelector('.cart-icon');
        const cartSidebar = document.querySelector('.cart-sidebar');
        const closeCart = document.querySelector('.close-cart');
        const cartItems = document.querySelector('.cart-items');
        const subtotalAmount = document.querySelector('.subtotal-amount');
        const installationAmount = document.querySelector('.installation-amount');
        const totalAmount = document.querySelector('.total-amount');

        function getProductImageById(productId) {
            if (productId === id) return product.image || fallbackImage;
            return PRODUCT_DATA[productId]?.image || fallbackImage;
        }

        function getProductArabicNameById(productId) {
            if (productId === id) return product.arabicName || '';
            return PRODUCT_DATA[productId]?.arabicName || '';
        }

        function normalizeCartItems(items) {
            return (items || []).map((item) => ({
                ...item,
                image: item.image || getProductImageById(item.id),
                nameAr: item.nameAr || getProductArabicNameById(item.id)
            }));
        }

        function showThemeToast(message, isError = false, variant = '') {
            const toast = document.getElementById('theme-toast');
            if (!toast) return;
            clearTimeout(toastTimer);
            toast.textContent = message;
            const classes = ['theme-toast', 'show'];
            if (isError) classes.push('error');
            else if (variant === 'warning') classes.push('warning');
            toast.className = classes.join(' ');
            const ms = isError || variant === 'warning' ? 3200 : 2400;
            toastTimer = setTimeout(() => toast.classList.remove('show'), ms);
        }

        async function loadStockStatuses() {
            try {
                const res = await fetch('/api/products/public');
                if (!res.ok) return;
                const data = await res.json();
                const products = Array.isArray(data.products) ? data.products : [];
                productStockMap = {};
                products.forEach((p) => {
                    productStockMap[p.productId] = Number(p.stock || 0);
                    mergeLiveProduct(p);
                });
            } catch (_e) { /* ignore */ }
        }

        async function flushPersistCart() {
            try {
                if (!isLoggedIn) {
                    localStorage.setItem('cart', JSON.stringify(cart));
                    return;
                }
                await fetch('/api/cart', {
                    method: 'PUT',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: cart })
                });
            } catch (_e) {
                localStorage.setItem('cart', JSON.stringify(cart));
            }
        }

        async function loadCartFromAccount() {
            try {
                const userRes = await fetch('/api/user', { credentials: 'include' });
                isLoggedIn = userRes.ok;
                if (!isLoggedIn) {
                    cart = normalizeCartItems(JSON.parse(localStorage.getItem('cart')) || []);
                    cartUserMutated = false;
                    updateCart();
                    return;
                }
                const cartRes = await fetch('/api/cart', { credentials: 'include' });
                if (!cartRes.ok) throw new Error('fail');
                const data = await cartRes.json();
                if (cartUserMutated) {
                    updateCart();
                    await flushPersistCart();
                    cartUserMutated = false;
                    return;
                }
                cart = normalizeCartItems(Array.isArray(data.items) ? data.items : []);
                updateCart();
                cartUserMutated = false;
            } catch (_e) {
                cart = normalizeCartItems(JSON.parse(localStorage.getItem('cart')) || []);
                updateCart();
            }
        }

        let saveTimer;
        function persistCart(immediate) {
            clearTimeout(saveTimer);
            if (immediate) return flushPersistCart();
            saveTimer = setTimeout(() => flushPersistCart(), 900);
        }

        function commitCartQtyInput(input) {
            const pid = input.dataset.id;
            const line = cart.find((i) => i.id === pid);
            if (!line) return;
            const raw = String(input.value ?? '').trim();
            if (raw === '') {
                updateCart();
                return;
            }
            const n = parseInt(raw, 10);
            if (!Number.isFinite(n)) {
                updateCart();
                return;
            }
            const stock = Number(productStockMap[pid] ?? Infinity);
            if (n <= 0) {
                cart = cart.filter((i) => i.id !== pid);
                cartUserMutated = true;
                updateCart();
                persistCart(true);
                return;
            }
            let next = n;
            if (n > stock) {
                showThemeToast('No more quantity available for this product.', false, 'warning');
                next = stock;
            }
            if (next !== line.quantity) {
                line.quantity = next;
                cartUserMutated = true;
                persistCart(true);
            }
            updateCart();
        }

        function updateCart() {
            InfinityCart.renderCartItems(cartItems, cart, {
                productStockMap,
                fallbackImage,
            });
            InfinityCart.updateCartTotals(cart, {
                subtotalEl: subtotalAmount,
                installationEl: installationAmount,
                totalEl: totalAmount,
                countSelector: '.cart-count',
            });
        }

        if (cartIcon) {
            cartIcon.addEventListener('click', (e) => {
                e.stopPropagation();
                cartSidebar.classList.toggle('active');
            });
        }
        closeCart.addEventListener('click', (e) => {
            e.stopPropagation();
            cartSidebar.classList.remove('active');
        });

        cartItems.addEventListener('change', (e) => {
            const inp = e.target.closest('.cart-qty-input');
            if (inp) commitCartQtyInput(inp);
        });
        cartItems.addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') return;
            const inp = e.target.closest('.cart-qty-input');
            if (inp) {
                e.preventDefault();
                commitCartQtyInput(inp);
            }
        });
        cartItems.addEventListener('click', (e) => {
            if (e.target.closest('.cart-qty-input')) return;
            const qtyBtn = e.target.closest('.quantity-btn');
            if (qtyBtn) {
                const pid = qtyBtn.dataset.id;
                const item = cart.find((i) => i.id === pid);
                if (!item) return;
                if (qtyBtn.classList.contains('plus')) {
                    const availableStock = Number(productStockMap[pid] ?? Infinity);
                    if (item.quantity >= availableStock) {
                        showThemeToast('No more quantity available for this product.', false, 'warning');
                        return;
                    }
                    item.quantity++;
                } else if (qtyBtn.classList.contains('minus')) {
                    item.quantity--;
                    if (item.quantity === 0) cart = cart.filter((i) => i.id !== pid);
                }
                cartUserMutated = true;
                updateCart();
                persistCart(true);
                return;
            }
            const removeBtn = e.target.closest('.remove-btn');
            if (removeBtn) {
                const pid = removeBtn.dataset.id;
                cart = cart.filter((item) => item.id !== pid);
                cartUserMutated = true;
                updateCart();
                persistCart(true);
            }
        });

        document.querySelector('.checkout-btn').addEventListener('click', async () => {
            if (cart.length === 0) {
                showThemeToast('Your cart is empty.', true);
                return;
            }
            try {
                await persistCart(true);
            } catch (_e) { /* continue */ }
            window.location.href = 'payment.html';
        });

        document.getElementById('add-to-cart').addEventListener('click', () => {
            const availableStock = Number(productStockMap[id] ?? Infinity);
            const currentQtyInCart = cart.find((item) => item.id === id)?.quantity || 0;
            if (currentQtyInCart >= availableStock) {
                showThemeToast('No more quantity available for this product.', false, 'warning');
                return;
            }
            const line = {
                id,
                name: product.name,
                nameAr: product.arabicName || '',
                price: Number(product.price || 0),
                installation: Number(product.installation || 0),
                image: product.image || fallbackImage,
                quantity: 1
            };
            const existingItem = cart.find((item) => item.id === id);
            if (existingItem) existingItem.quantity++;
            else cart.push(line);
            cartUserMutated = true;
            updateCart();
            persistCart(true);
            showThemeToast('Added to cart');
        });

        loadCartFromAccount();
        loadStockStatuses();
        })();
    </script>
</body>
</html>
